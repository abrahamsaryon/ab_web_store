version: "3.8"

services:
  db:
    image: mysql:8
    container_name: ab_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: URzpyroEIdfEDTuMxSRVZvkOCHuKBqmg
      MYSQL_DATABASE: railway
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/src/config/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  backend:
    build: ./backend
    container_name: ab_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: URzpyroEIdfEDTuMxSRVZvkOCHuKBqmg
      DB_NAME: railway
      JWT_SECRET: ab_webstore_jwt_secret_2025
      NODE_ENV: production
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: ab_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
    depends_on:
      - backend

volumes:
  mysql_data:
